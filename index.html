<script>
'use strict';
/* =====================================================================
   Network Highway 3D — every packet is a vehicle.
   out = drives from YOUR COMPUTER toward the destination's exit sign
   in  = comes home on the same road's return lane
   Bursts from one flow merge into a single vehicle (hover shows count),
   and vehicles keep a safe following distance — no more pile-ups.
   ===================================================================== */

const WS_URL = 'ws://localhost:8765';
const MAX_ROADS = 8;                    // + shared "OTHER TRAFFIC" road
const MAX_VEHICLES = 220;
const MAX_SPAWN_PER_BATCH = 30;
const MAX_PER_LANE = 32;                // beyond this, packets merge into the rear vehicle

const ROAD_LEN = 392, ROAD_END = ROAD_LEN / 2;   // x from -196 … +196
const ROAD_W = 16, ROAD_GAP = 30, LANE_OFF = 4;
const AGG_WINDOW = 450;                 // ms — same-flow packets merge within this
const AGG_ZONE = 60;                    // …while the vehicle is still near its spawn

const SIZES = { moto: 4, car: 8, truck: 15, acar: 8.2, atruck: 15.5 };  // lengths
const SPEEDS = { moto: 72, car: 56, truck: 42, acar: 54, atruck: 40 };

/* ------------------------------------------------ three.js scene --- */
const wrap = document.getElementById('wrap');
const tooltip = document.getElementById('tooltip');
const modeEl = document.getElementById('mode');
const pauseBtn = document.getElementById('pauseBtn');
const pausedStamp = document.getElementById('paused-stamp');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setClearColor(0x17191d);
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x17191d, 700, 1400);

const camera = new THREE.PerspectiveCamera(50, 1, 1, 3000);
scene.add(new THREE.HemisphereLight(0x8fa3c4, 0x1c1e22, 0.95));

sun.position.set(180, 320, 220);

const ground = new THREE.Mesh(

ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.3;

const vehicleLayer = new THREE.Group();

/* ------------------------------------------------ orbit camera ----- */
const HOME = { theta: Math.PI / 2, phi: 0.92, r: 430 };
const cam = { ...HOME, target: new THREE.Vector3(0, 0, 0) };
function applyCamera() {
  cam.phi = Math.min(1.45, Math.max(0.12, cam.phi));
  cam.r = Math.min(1100, Math.max(90, cam.r));
  camera.position.set(
    cam.target.x + cam.r * Math.sin(cam.phi) * Math.cos(cam.theta),
    cam.target.y + cam.r * Math.cos(cam.phi),
    cam.target.z + cam.r * Math.sin(cam.phi) * Math.sin(cam.theta)
  );
  camera.lookAt(cam.target);
}
let dragging = false, lastPX = 0, lastPY = 0;
renderer.domElement.addEventListener('pointerdown', e => {
  dragging = true; lastPX = e.clientX; lastPY = e.clientY;
  renderer.domElement.setPointerCapture(e.pointerId);
});
window.addEventListener('pointerup', () => dragging = false);
window.addEventListener('pointermove', e => {
  const r = renderer.domElement.getBoundingClientRect();
  mouse.sx = e.clientX - r.left; mouse.sy = e.clientY - r.top;
  mouse.x = (mouse.sx / r.width) * 2 - 1;
  mouse.y = -(mouse.sy / r.height) * 2 + 1;
  if (!dragging) return;
  cam.theta += (e.clientX - lastPX) * 0.0045;
  cam.phi   -= (e.clientY - lastPY) * 0.0045;
  lastPX = e.clientX; lastPY = e.clientY;
  applyCamera();
});
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  cam.r *= Math.exp(e.deltaY * 0.0011);
  applyCamera();
}, { passive: false });

function resize() {
  const r = wrap.getBoundingClientRect();
  renderer.setSize(r.width, r.height);
  camera.aspect = r.width / r.height;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize(); applyCamera();

/* ------------------------------------------------ helpers ---------- */
const mouse = { x: 0, y: 0, sx: -1, sy: -1 };
const raycaster = new THREE.Raycaster();

function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
  return (b / 1073741824).toFixed(2) + ' GB';
}
function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
function rr(c, x, y, w, h, r) {           // canvas rounded rect w/ fallback
  if (c.roundRect) { c.beginPath(); c.roundRect(x, y, w, h, r); }
  else { c.beginPath(); c.rect(x, y, w, h); }
}

/* ------------------------------------------------ signs & hub ------ */
function makeBoardSprite(scaleX, scaleY) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 170;
  const texture = new THREE.CanvasTexture(canvas);
  texture.anisotropy = 4;
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
  sprite.scale.set(scaleX, scaleY, 1);
  sprite.userData.canvas = canvas;
  sprite.userData.texture = texture;
  return sprite;
}
function paintSign(sprite, label, tx, rx) {
  const c = sprite.userData.canvas.getContext('2d');
  c.clearRect(0, 0, 512, 170);
  c.fillStyle = '#1E6B3C'; rr(c, 4, 4, 504, 162, 18); c.fill();
  c.strokeStyle = '#F2F4F0'; c.lineWidth = 7; rr(c, 14, 14, 484, 142, 12); c.stroke();
  c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = '700 52px Overpass, sans-serif';
  let t = label;
  while (c.measureText(t).width > 440 && t.length > 4) t = t.slice(0, -2);
  if (t !== label) t += '…';
  c.fillText(t, 256, 62);
  c.font = '600 34px "IBM Plex Mono", monospace';
  c.fillStyle = '#CFE5D6';
  c.fillText(`↑ ${fmtBytes(tx)}  ↓ ${fmtBytes(rx)}`, 256, 118);
  sprite.userData.texture.needsUpdate = true;
}

const roadGeo = new THREE.BoxGeometry(ROAD_LEN, 0.4, ROAD_W);
const roadMat = new THREE.MeshLambertMaterial({ color: 0x25282e });
const edgeGeo = new THREE.BoxGeometry(ROAD_LEN, 0.12, 0.5);
const edgeMat = new THREE.MeshLambertMaterial({ color: 0xd8d6ce });
const midMat  = new THREE.MeshLambertMaterial({ color: 0xe8c34a });
const postGeo = new THREE.CylinderGeometry(0.5, 0.5, 12, 8);
const postMat = new THREE.MeshLambertMaterial({ color: 0x3a3f47 });

function buildRoadGroup() {
  const g = new THREE.Group();
  g.add(new THREE.Mesh(roadGeo, roadMat));
  const eTop = new THREE.Mesh(edgeGeo, edgeMat); eTop.position.set(0, 0.25, -ROAD_W/2 + 0.6);
  const eBot = new THREE.Mesh(edgeGeo, edgeMat); eBot.position.set(0, 0.25,  ROAD_W/2 - 0.6);
  const m1 = new THREE.Mesh(edgeGeo, midMat); m1.position.set(0, 0.25, -0.7);
  const m2 = new THREE.Mesh(edgeGeo, midMat); m2.position.set(0, 0.25,  0.7);
  g.add(eTop, eBot, m1, m2);
  for (const dz of [-6, 6]) {
    const post = new THREE.Mesh(postGeo, postMat);
    post.position.set(ROAD_END + 10, 6, dz);
    g.add(post);
  }
  const sign = makeBoardSprite(32, 10.6);
  sign.position.set(ROAD_END + 10, 15, 0);
  g.add(sign);
  g.userData.sign = sign;
  return g;
}

/* hub — YOUR COMPUTER */
const hub = new THREE.Group();
{
  const bld = new THREE.Mesh(new THREE.BoxGeometry(14, 15, 60),
                             new THREE.MeshLambertMaterial({ color: 0x1b1e24 }));
  bld.position.set(-(ROAD_END + 15), 7.5, 0);
  const screen = new THREE.Mesh(new THREE.PlaneGeometry(3, 42),
    new THREE.MeshLambertMaterial({ color: 0x57d98a, emissive: 0x2f8f57 }));
  screen.rotation.y = Math.PI / 2;
  screen.rotation.z = Math.PI / 2;
  screen.position.set(-(ROAD_END + 7.8), 9, 0);
  const label = makeBoardSprite(34, 11.3);
  label.position.set(-(ROAD_END + 15), 21, 0);
  const c = label.userData.canvas.getContext('2d');
  c.fillStyle = '#121419'; rr(c, 4, 24, 504, 122, 16); c.fill();
  c.strokeStyle = '#57D98A'; c.lineWidth = 5; rr(c, 12, 32, 488, 106, 12); c.stroke();
  c.fillStyle = '#F2F4F0'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = '800 54px Overpass, sans-serif';
  c.fillText('YOUR COMPUTER', 256, 86);
  label.userData.texture.needsUpdate = true;
  hub.add(bld, screen, label);
  hub.userData = { bld, label };
}
scene.add(hub);

/* ------------------------------------------------ roads ------------ */
const roads = new Map();
let roadOrder = [];
const dirtySigns = new Set();

function shortDomain(h) {
  if (!h) return null;
  const parts = h.replace(/\.$/, '').toLowerCase().split('.');
  if (parts.length <= 2) return h.toLowerCase();
  const sld = new Set(['co', 'com', 'net', 'org', 'gov', 'ac', 'edu', 'nic']);
  const last = parts[parts.length - 1], second = parts[parts.length - 2];
  if (last.length === 2 && sld.has(second)) return parts.slice(-3).join('.');
  return parts.slice(-2).join('.');
}

function makeRoad(key, label) {
  const group = buildRoadGroup();
  group.position.z = (roadOrder.length + 2) * ROAD_GAP + 120;   // slide in from far side
  scene.add(group);
  const r = { key, label, group, targetZ: 0,
              lastActive: performance.now(), tx: 0, rx: 0 };
  paintSign(group.userData.sign, label, 0, 0);
  return r;
}

function getRoad(pkt) {
  const key = shortDomain(pkt.host) || pkt.remote || 'unknown';
  let road = roads.get(key);
  if (road) return road;

  if (roads.size < MAX_ROADS) {
    road = makeRoad(key, key);
    roads.set(key, road); roadOrder.push(road);
    return road;
  }
  const now = performance.now();
  let stale = null;
  for (const r of roads.values()) {
    if (r.key === 'other') continue;
    if (now - r.lastActive > 6000 && (!stale || r.lastActive < stale.lastActive)) stale = r;
  }
  if (stale) {
    roads.delete(stale.key);
    for (let i = vehicles.length - 1; i >= 0; i--)
      if (vehicles[i].road === stale) removeVehicle(i);
    stale.key = key; stale.label = key; stale.tx = stale.rx = 0;
    roads.set(key, stale);
    dirtySigns.add(stale);
    return stale;
  }
  let other = roads.get('other');
  if (!other) {
    other = makeRoad('other', 'OTHER TRAFFIC');
    roads.set('other', other); roadOrder.push(other);
  }
  return other;
}

function layoutRoads() {
  const n = roadOrder.length;
  roadOrder.forEach((r, i) => {
    r.targetZ = (i - (n - 1) / 2) * ROAD_GAP;
    r.group.position.z += (r.targetZ - r.group.position.z) * 0.1;
  });
  const depth = Math.max(60, n * ROAD_GAP + 30);
  hub.userData.bld.scale.z = depth / 60;
}

/* ------------------------------------------------ vehicle meshes --- */
const CIVILIAN_COLORS = [0xc94f4f, 0x4f7bc9, 0xc9a24f, 0x7c56c9,
                         0x4fc98e, 0xd07a3f, 0xb8bec6, 0xd06aa8];
const WHEEL_MAT = new THREE.MeshLambertMaterial({ color: 0x15171a });
const TRAILER_MAT = new THREE.MeshLambertMaterial({ color: 0xc9cdd4 });
const ARMOR_MAT = new THREE.MeshLambertMaterial({ color: 0x4a5d3a });
const ARMOR_DK = new THREE.MeshLambertMaterial({ color: 0x37452b });
const SHIELD_MAT = new THREE.MeshLambertMaterial({ color: 0xede9d8 });
const HEAD_MAT = new THREE.MeshLambertMaterial({ color: 0xffe9a8, emissive: 0xd8b45e });
const TAIL_MAT = new THREE.MeshLambertMaterial({ color: 0xe5484d, emissive: 0xa22 });
const wheelGeo = new THREE.CylinderGeometry(0.95, 0.95, 0.7, 10);

function addWheels(g, xs, halfZ, r = 0.95) {
  for (const x of xs) for (const z of [halfZ, -halfZ]) {
    const w = new THREE.Mesh(wheelGeo, WHEEL_MAT);
    w.rotation.x = Math.PI / 2;
    w.scale.setScalar(r / 0.95);
    w.position.set(x, r, z);
    g.add(w);
  }
}
function addLamps(g, frontX, backX, y, z) {
  for (const s of [z, -z]) {
    const h = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.5, 0.7), HEAD_MAT);
    h.position.set(frontX, y, s); g.add(h);
    const t = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.45, 0.7), TAIL_MAT);
    t.position.set(backX, y, s); g.add(t);
  }
}
function paintable(mesh, list) { list.push(mesh); return mesh; }

const builders = {
  car() {
    const g = new THREE.Group(), p = [];
    const bodyM = new THREE.MeshLambertMaterial({ color: 0xffffff });
    const body = paintable(new THREE.Mesh(new THREE.BoxGeometry(7, 1.6, 3.4), bodyM), p);
    body.position.y = 1.6; g.add(body);
    const cabin = paintable(new THREE.Mesh(new THREE.BoxGeometry(3.8, 1.3, 3), bodyM), p);
    cabin.position.set(-0.4, 2.9, 0); g.add(cabin);
    addWheels(g, [-2.3, 2.3], 1.75);
    addLamps(g, 3.5, -3.5, 1.6, 1.1);
    g.userData.paint = p;
    return g;
  },
  truck() {
    const g = new THREE.Group(), p = [];
    const cabM = new THREE.MeshLambertMaterial({ color: 0xffffff });
    const trailer = new THREE.Mesh(new THREE.BoxGeometry(9.5, 3.4, 3.6), TRAILER_MAT);
    trailer.position.set(-2.2, 2.5, 0); g.add(trailer);
    const cab = paintable(new THREE.Mesh(new THREE.BoxGeometry(3.6, 2.8, 3.4), cabM), p);
    cab.position.set(4.9, 2.1, 0); g.add(cab);
    addWheels(g, [-5.6, -3, 0.2, 4.9], 1.8, 1.05);
    addLamps(g, 6.75, -6.95, 1.6, 1.1);
    g.userData.paint = p;
    return g;
  },
  moto() {
    const g = new THREE.Group(), p = [];
    const bodyM = new THREE.MeshLambertMaterial({ color: 0xffffff });
    const body = paintable(new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.7, 0.9), bodyM), p);
    body.position.y = 1.3; g.add(body);
    const rider = paintable(new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.9), bodyM), p);
    rider.position.set(-0.4, 2.3, 0); g.add(rider);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.55, 8, 8),
                                new THREE.MeshLambertMaterial({ color: 0x15171a }));
    head.position.set(-0.2, 3.2, 0); g.add(head);
    addWheels(g, [-1.3, 1.3], 0, 0.72);
    addLamps(g, 1.55, -1.5, 1.3, 0.15);
    g.userData.paint = p;
    return g;
  },
  acar() {
    const g = new THREE.Group();
    const hull = new THREE.Mesh(new THREE.BoxGeometry(7.4, 2.1, 3.6), ARMOR_MAT);
    hull.position.y = 2; g.add(hull);
    const top = new THREE.Mesh(new THREE.BoxGeometry(4.6, 1.1, 3.1), ARMOR_DK);
    top.position.set(-0.3, 3.5, 0); g.add(top);
    for (const s of [1.86, -1.86]) {
      const shield = new THREE.Mesh(new THREE.BoxGeometry(1.1, 1.3, 0.12), SHIELD_MAT);
      shield.position.set(0.4, 2.1, s); g.add(shield);
    }
    addWheels(g, [-2.4, 2.4], 1.8, 1.05);
    addLamps(g, 3.75, -3.75, 2, 1.15);
    g.userData.paint = [];
    return g;
  },
  atruck() {
    const g = new THREE.Group();
    const hull = new THREE.Mesh(new THREE.BoxGeometry(12.6, 2.7, 3.8), ARMOR_MAT);
    hull.position.y = 2.3; g.add(hull);
    const nose = new THREE.Mesh(new THREE.BoxGeometry(2.6, 1.7, 3.4), ARMOR_DK);
    nose.position.set(6.4, 1.9, 0); g.add(nose);
    for (const hx of [-3.5, 0.5]) {
      const hatch = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.9, 2.9), ARMOR_DK);
      hatch.position.set(hx, 4.05, 0); g.add(hatch);
    }
    for (const s of [1.96, -1.96]) {
      const shield = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.6, 0.12), SHIELD_MAT);
      shield.position.set(3, 2.3, s); g.add(shield);
    }
    addWheels(g, [-5.2, -2.6, 0, 5.6], 1.9, 1.1);
    addLamps(g, 7.75, -6.35, 1.8, 1.2);
    g.userData.paint = [];
    return g;
  },
};

const pools = { car: [], truck: [], moto: [], acar: [], atruck: [] };
function acquireMesh(vtype) {
  const g = pools[vtype].pop() || builders[vtype]();
  g.visible = true;
  vehicleLayer.add(g);
  return g;
}
function releaseMesh(vtype, g) {
  g.visible = false;
  vehicleLayer.remove(g);
  pools[vtype].push(g);
}
function paintMesh(g, color) {
  for (const m of g.userData.paint) m.material.color.setHex(color);
}

/* highlight box for the hovered vehicle */
const highlight = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.MeshBasicMaterial({ color: 0xffb94f, wireframe: true })
);
highlight.visible = false;
scene.add(highlight);

/* ------------------------------------------------ vehicles --------- */
const vehicles = [];
const aggMap = new Map();      // flowKey -> vehicle (merge bursts near spawn)
const recent = [];             // packet stats

function vtypeFor(bytes, secure) {
  if (bytes >= 1100) return secure ? 'atruck' : 'truck';
  if (bytes >= 250 || secure) return secure ? 'acar' : 'car';
  return 'moto';
}
function flowKey(road, p) {
  return road.key + '|' + p.dir + '|' + (p.dir === 'out' ? p.dport : p.sport) + '|' + p.proto;
}
function travelled(v) { return v.dir === 'out' ? v.x + ROAD_END : ROAD_END - v.x; }

function removeVehicle(i) {
  const v = vehicles[i];
  v.dead = true;
  releaseMesh(v.vtype, v.mesh);
  vehicles.splice(i, 1);
}

function retype(v) {
  const nt = vtypeFor(v.bytes, v.pkt.secure);
  if (nt === v.vtype) return;
  releaseMesh(v.vtype, v.mesh);
  v.vtype = nt;
  v.len = SIZES[nt];
  v.mesh = acquireMesh(nt);
  paintMesh(v.mesh, v.color);
}

function laneCount(road, dir) {
  let n = 0;
  for (const v of vehicles) if (v.road === road && v.dir === dir) n++;
  return n;
}
function rearVehicle(road, dir) {
  let rear = null, best = Infinity;
  for (const v of vehicles)
    if (v.road === road && v.dir === dir && travelled(v) < best) { best = travelled(v); rear = v; }
  return rear;
}

function spawnVehicle(pkt) {
  const road = getRoad(pkt);
  road.lastActive = performance.now();
  if (pkt.dir === 'out') road.tx += pkt.size; else road.rx += pkt.size;
  dirtySigns.add(road);
  recent.push({ t: performance.now(), size: pkt.size });

  // 1) burst aggregation — same flow, vehicle still near spawn → merge
  const fk = flowKey(road, pkt);
  const agg = aggMap.get(fk);
  if (agg && !agg.dead && agg.road === road &&
      performance.now() - agg.bornAt < AGG_WINDOW && travelled(agg) < AGG_ZONE) {
    agg.count++; agg.bytes += pkt.size;
    retype(agg);
    return;
  }

  // 2) congestion valve — lane full → merge into the rearmost vehicle
  if (laneCount(road, pkt.dir) >= MAX_PER_LANE) {
    const rear = rearVehicle(road, pkt.dir);
    if (rear) { rear.count++; rear.bytes += pkt.size; rear.mixed = true; retype(rear); }
    return;
  }

  const vtype = vtypeFor(pkt.size, pkt.secure);
  const v = {
    road, pkt, dir: pkt.dir,
    vtype, len: SIZES[vtype],
    x: pkt.dir === 'out' ? -ROAD_END + 4 : ROAD_END - 4,
    speed: SPEEDS[vtype] * (0.9 + Math.random() * 0.2),
    color: CIVILIAN_COLORS[(Math.random() * CIVILIAN_COLORS.length) | 0],
    bornAt: performance.now(),
    count: 1, bytes: pkt.size, mixed: false, dead: false,
    mesh: acquireMesh(vtype),
  };
  paintMesh(v.mesh, v.color);
  vehicles.push(v);
  aggMap.set(fk, v);
  if (aggMap.size > 600) aggMap.clear();          // cheap periodic reset
  if (vehicles.length > MAX_VEHICLES) removeVehicle(0);
}

function updateVehicles(dt) {
  // advance
  for (const v of vehicles) v.x += (v.dir === 'out' ? 1 : -1) * v.speed * dt;

  // car-following: group per lane, front-first, clamp followers to a safe gap
  const lanes = new Map();
  for (const v of vehicles) {
    const k = v.road.key + '|' + v.dir;
    (lanes.get(k) || lanes.set(k, []).get(k)).push(v);
  }
  for (const lane of lanes.values()) {
    lane.sort((a, b) => travelled(b) - travelled(a));
    for (let i = 1; i < lane.length; i++) {
      const lead = lane[i - 1], v = lane[i];
      const gap = (lead.len + v.len) / 2 + 2.8;
      if (v.dir === 'out') v.x = Math.min(v.x, lead.x - gap);
      else v.x = Math.max(v.x, lead.x + gap);
    }
  }

  // despawn at the far end only (queued vehicles may sit behind the spawn)
  for (let i = vehicles.length - 1; i >= 0; i--) {
    const v = vehicles[i];
    if ((v.dir === 'out' && v.x > ROAD_END + 2) ||
        (v.dir === 'in' && v.x < -ROAD_END - 2)) removeVehicle(i);
  }
}

function placeVehicles() {
  for (const v of vehicles) {
    const z = v.road.group.position.z + (v.dir === 'out' ? -LANE_OFF : LANE_OFF);
    v.mesh.position.set(v.x, 0, z);
    v.mesh.rotation.y = v.dir === 'out' ? 0 : Math.PI;
    v.mesh.visible = v.dir === 'out' ? v.x > -ROAD_END - 2 : v.x < ROAD_END + 2;
  }
}

/* ------------------------------------------------ hover / tooltip -- */
let hovered = null;
function pickVehicle() {
  hovered = null;
  if (!paused || mouse.sx < 0) { highlight.visible = false; tooltip.style.display = 'none'; return; }
  raycaster.setFromCamera({ x: mouse.x, y: mouse.y }, camera);
  const hits = raycaster.intersectObjects(vehicleLayer.children, true);
  if (hits.length) {
    let node = hits[0].object;
    while (node.parent && node.parent !== vehicleLayer) node = node.parent;
    for (const v of vehicles) if (v.mesh === node) { hovered = v; break; }
  }
  if (!hovered) { highlight.visible = false; tooltip.style.display = 'none'; return; }

  const box = new THREE.Box3().setFromObject(hovered.mesh);
  const size = new THREE.Vector3(), center = new THREE.Vector3();
  box.getSize(size); box.getCenter(center);
  highlight.position.copy(center);
  highlight.scale.set(size.x + 1.5, size.y + 1.5, size.z + 1.5);
  highlight.visible = true;

  const p = hovered.pkt;
  const t = new Date(p.ts * 1000);
  const hh = t.toTimeString().slice(0, 8) + '.' + String(t.getMilliseconds()).padStart(3, '0');
  const secLabel = p.secure
    ? '<span class="sec">🛡 ENCRYPTED (secure port)</span>'
    : '<span class="insec">PLAINTEXT</span>';
  const arrow = p.dir === 'out' ? 'OUT →' : '← IN ';
  const sp = p.sport != null ? ':' + p.sport : '';
  const dp = p.dport != null ? ':' + p.dport : '';
  const pk = hovered.count > 1
    ? `${hovered.count} packets${hovered.mixed ? ' (merged flows)' : ''} · ${hovered.bytes.toLocaleString()} bytes total`
    : `${p.size.toLocaleString()} bytes`;
  tooltip.innerHTML =
    `<span class="dest">${esc(hovered.road.label)}</span>  ${secLabel}\n` +
    `${arrow}  ${esc(p.src)}${sp} → ${esc(p.dst)}${dp}\n` +
    `${p.proto} · ${pk} · ${hovered.vtype.replace('a', 'armored ')}` +
    (p.host ? `\nhost  ${esc(p.host)}` : '') +
    `\ntime  ${hh}`;
  tooltip.style.display = 'block';
  const r = wrap.getBoundingClientRect();
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  let tx = mouse.sx + 16, ty = mouse.sy - th - 12;
  if (tx + tw > r.width - 8) tx = mouse.sx - tw - 16;
  if (ty < 8) ty = mouse.sy + 18;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}

/* ------------------------------------------------ controls --------- */
let paused = false;
function setPaused(p) {
  paused = p;
  pauseBtn.textContent = paused ? '▶ RESUME' : '⏸ PAUSE';
  pauseBtn.setAttribute('aria-pressed', String(paused));
  pausedStamp.style.display = paused ? 'block' : 'none';
  renderer.domElement.style.cursor = paused ? 'crosshair' : 'grab';
}
pauseBtn.addEventListener('click', () => setPaused(!paused));
window.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); setPaused(!paused); }
  if (e.code === 'KeyR') { Object.assign(cam, HOME); applyCamera(); }
});
setPaused(false);

/* ------------------------------------------------ stats ------------ */
function updateStats() {
  const now = performance.now();
  while (recent.length && now - recent[0].t > 2000) recent.shift();
  document.getElementById('stVeh').textContent = vehicles.length;
  document.getElementById('stPps').textContent = Math.round(recent.length / 2);
  const bps = recent.reduce((a, r) => a + r.size, 0) / 2;
  document.getElementById('stBps').textContent = fmtBytes(Math.round(bps)) + '/s';
}
setInterval(updateStats, 500);
setInterval(() => {                       // repaint changed exit boards
  for (const r of dirtySigns) paintSign(r.group.userData.sign, r.label, r.tx, r.rx);
  dirtySigns.clear();
}, 500);
if (document.fonts && document.fonts.ready)
  document.fonts.ready.then(() => { for (const r of roads.values()) dirtySigns.add(r); });

/* ------------------------------------------------ main loop -------- */
let lastT = performance.now();
function frame(t) {
  const dt = Math.min(0.05, (t - lastT) / 1000);
  lastT = t;
  layoutRoads();
  if (!paused) updateVehicles(dt);
  placeVehicles();
  pickVehicle();
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ------------------------------------------------ data feed -------- */
function setMode(cls, text) { modeEl.className = 'badge ' + cls; modeEl.textContent = text; }

let demoTimer = null;
let everConnected = false;

function connect() {
  let ws;
  try { ws = new WebSocket(WS_URL); } catch { startDemo(); return; }
  const failTimer = setTimeout(() => { if (ws.readyState !== 1) ws.close(); }, 1800);
  ws.onopen = () => {
    clearTimeout(failTimer);
    everConnected = true;
    stopDemo();
    setMode('live', 'LIVE CAPTURE');
  };
  ws.onmessage = e => {
    if (paused) return;                       // don't stack up traffic while frozen
    const msg = JSON.parse(e.data);
    if (msg.type !== 'packets') return;
    const items = msg.items.length > MAX_SPAWN_PER_BATCH
      ? msg.items.filter((_, i) => i % Math.ceil(msg.items.length / MAX_SPAWN_PER_BATCH) === 0)
      : msg.items;
    for (const p of items) spawnVehicle(p);
  };
  ws.onclose = () => {
    clearTimeout(failTimer);
    if (everConnected) { setMode('wait', 'RECONNECTING…'); setTimeout(connect, 3000); }
    else startDemo();
  };
  ws.onerror = () => {};
}

const DEMO_HOSTS = [
  { host: 'google.com',        ip: '142.250.183.14', port: 443, secure: true,  weight: 4, big: .35 },
  { host: 'youtube.com',       ip: '142.250.183.78', port: 443, secure: true,  weight: 3, big: .75 },
  { host: 'github.com',        ip: '140.82.112.3',   port: 443, secure: true,  weight: 2, big: .4  },
  { host: 'api.anthropic.com', ip: '160.79.104.10',  port: 443, secure: true,  weight: 2, big: .5  },
  { host: 'dns.google',        ip: '8.8.8.8',        port: 53,  secure: false, weight: 3, big: 0   },
  { host: 'example.com',       ip: '93.184.215.14',  port: 80,  secure: false, weight: 1, big: .3  },
  { host: 'pool.ntp.org',      ip: '162.159.200.1',  port: 123, secure: false, weight: 1, big: 0   },
];
function demoSize(big) {
  if (Math.random() < big) return 1100 + (Math.random() * 12000 | 0);
  return Math.random() < 0.5 ? 60 + (Math.random() * 180 | 0)
                             : 260 + (Math.random() * 800 | 0);
}
function startDemo() {
  if (demoTimer) return;
  setMode('demo', 'DEMO TRAFFIC');
  const bag = DEMO_HOSTS.flatMap(h => Array(h.weight).fill(h));
  demoTimer = setInterval(() => {
    if (paused || Math.random() < 0.25) return;
    const h = bag[(Math.random() * bag.length) | 0];
    const sport = 49152 + ((Math.random() * 16000) | 0);
    const out = {
      ts: Date.now() / 1000, dir: 'out',
      src: '192.168.1.7', dst: h.ip, sport, dport: h.port,
      proto: h.port === 53 || h.port === 123 ? 'UDP' : 'TCP',
      size: demoSize(h.big), secure: h.secure, remote: h.ip, host: h.host,
    };
    spawnVehicle(out);
    const replies = 1 + (Math.random() * (h.big > 0.5 ? 3 : 1) | 0);
    for (let i = 1; i <= replies; i++) {
      setTimeout(() => {
        if (paused) return;
        spawnVehicle({ ...out, ts: Date.now() / 1000, dir: 'in',
                       src: h.ip, dst: '192.168.1.7',
                       sport: h.port, dport: sport, size: demoSize(h.big) });
      }, 120 * i + Math.random() * 260);
    }
  }, 130);
}
function stopDemo() {
  if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }
}

connect();
</script>
